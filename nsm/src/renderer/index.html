<!-- src/renderer/index.html -->
<!DOCTYPE html>
<html class="light">
    <head>
        <meta charset="UTF-8">
        <title>Nopify Server Manager</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="tab-bar"></div>
        <div class="toolbar" id="main-toolbar">
            <div class="toolbar-buttons" id="toolbar-buttons">
                <button id="newBtn">New</button>
                <button id="saveBtn" disabled>Save</button>
                <button id="cancelBtn" disabled>Cancel</button>
                <button id="deleteBtn" disabled>Delete</button>
                <button id="executeBtn" disabled>Execute</button>
            </div>
            <div class="toolbar-buttons" id="result-toolbar-buttons" style="display:none">
                <button id="result-executeBtn" disabled>Execute</button>
                <button id="result-closeBtn">Close</button>
            </div>
            <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode">
                <img id="themeIcon" src="../assets/moon.svg" alt="Theme toggle">
            </button>
        </div>
        <div id="tab-panels">
            <div id="panel-servers" class="tab-panel active">
                <table id="grid">
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <input type="checkbox" id="selectAll">
                            </th>
                            <th data-col="nickname" data-type="string">Nickname <span class="sort-indicator"></span></th>
                            <th data-col="hostname" data-type="string">Hostname <span class="sort-indicator"></span></th>
                            <th data-col="username" data-type="string">Username <span class="sort-indicator"></span></th>
                            <th data-col="password" data-type="string">Password <span class="sort-indicator"></span></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div id="status-bar">Ready</div>
        <div id="grid-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:999; pointer-events:auto;"></div>
        <script src="renderer.js"></script>
    </body>
</html>
